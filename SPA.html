<!DOCTYPE html>
<html>
<head>
    
<title>Movie Search SPA</title>

    
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<style>
body {
    background-color: black;
    color: #ffffff;
}
.card {
    background-color: white;
}

</style>



<div class="container mt-4">

    <h2 class="text-center mb-4" style="color:white;">
    Movie Search SPA
</h2>


    <!-- ADMIN LOGIN -->
    <div id="loginBox" class="card p-3 mb-4">
        <h5 class="text-black">Admin Login</h5>
        <input id="username" class="form-control mb-2" placeholder="Username">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button id="loginBtn" class="btn btn-info">Login</button>
        <p id="msg" class="text-danger mt-2"></p>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="card p-3 mb-4 d-none">
        <h5>Add Movie</h5>
        <input id="title" class="form-control mb-2" placeholder="Movie Title">
        <input id="poster" class="form-control mb-2" placeholder="Poster Image URL">
        <input id="trailer" class="form-control mb-2" placeholder="Trailer URL">
        <input id="keywords" class="form-control mb-2" placeholder="Keywords">
        <textarea id="details" class="form-control mb-2" placeholder="Movie Details"></textarea>
        <button id="addMovie" class="btn btn-info">Upload Movie</button>
    </div>

    <!-- SEARCH -->
    <input id="search" class="form-control mb-3"
           placeholder="Search movie by keyword">

    <!-- MOVIE LIST -->
    <div id="movieList" class="row"></div>

</div>

<!-- JAVASCRIPT -->
<script>
$(document).ready(function () {

    
    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    displayMovies(movies);

    
    $("#loginBtn").click(function () {
        if ($("#username").val() === "Radhika" &&
            $("#password").val() === "BRadhika@123") {
            $("#loginBox").hide();
            $("#adminPanel").removeClass("d-none");
        } else {
            $("#msg").text("Invalid login credentials");
        }
    });

    
    $("#addMovie").click(function () {

        let movie = {
            title: $("#title").val(),
            poster: $("#poster").val(),
            trailer: $("#trailer").val(),
            keywords: $("#keywords").val().toLowerCase(),
            details: $("#details").val()
        };

        movies.push(movie);
        localStorage.setItem("movies", JSON.stringify(movies));
        displayMovies(movies);
        clearForm();
    });

    // Search Movie
    $("#search").on("keyup", function () {
        let key = $(this).val().toLowerCase();
        let filtered = movies.filter(m => m.keywords.includes(key));
        displayMovies(filtered);
    });

    // Display Movies
    function displayMovies(list) {
        $("#movieList").empty();
        list.forEach(m => {
            $("#movieList").append(`
                <div class="col-md-4 mb-3">
                    <div class="card h-100">
                        <img src="${m.poster}" class="card-img-top" height="280">
                        <div class="card-body">
                            <h5>${m.title}</h5>
                            <p>${m.details}</p>
                            <a href="${m.trailer}" target="_blank"
                               class="btn btn-danger btn-sm">Watch Trailer</a>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    // Clear Form
    function clearForm() {
        $("#title, #poster, #trailer, #keywords, #details").val("");
    }

});
</script>

</body>
</html>
